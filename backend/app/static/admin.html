<!DOCTYPE html>
<html>
<head>
    <title>Kirana Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial;
            background: #f6f8fa;
            margin: 0;
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
        }

        .cards {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            flex: 1;
            padding: 20px;
            border-radius: 10px;
            color: white;
            font-size: 18px;
        }

        .total { background: #333; }
        .sent { background: #007bff; }
        .accepted { background: #ff9800; }
        .ready { background: #28a745; }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            text-align: left;
        }

        th {
            background: #fafafa;
        }

        .badge {
            padding: 5px 10px;
            border-radius: 20px;
            color: white;
            font-size: 12px;
        }

        .CREATED { background: gray; }
        .SENT { background: blue; }
        .ACCEPTED { background: orange; }
        .READY { background: green; }
        .COMPLETED { background: purple; }

        button {
            border: none;
            padding: 6px 10px;
            margin: 2px;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn-accept { background: orange; color: white; }
        .btn-ready { background: green; color: white; }
        .btn-complete { background: purple; color: white; }

        .new-row {
		    background: #fff3cd !important;
		    transition: background 2s ease;
		}

.progress-container {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 20px 0;
}



/* LINE */
.progress-step::before {
    content: "";
    position: absolute;
    top: 10px;
    left: -50%;
    width: 100%;
    height: 3px;
    background: #ddd;
    z-index: 0;
    transition: background 0.6s ease;
}

.progress-step:first-child::before {
    display: none;
}

/* FILLED LINE */
.progress-step.active::before {
    background: #28a745;
}

/* CIRCLE */
.progress-circle {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #ddd;
    margin: auto;
    z-index: 1;
    position: relative;
    transition: all 0.4s ease;
}

.progress-step {
    text-align: center;
    flex: 1;
    position: relative;
    padding: 0 5px;   /* 🔥 ADD THIS */
}

/* COMPLETED */
.progress-step.active .progress-circle {
    background: #28a745;
    transform: scale(1.1);
}

/* CURRENT STEP (🔥 animation) */
.progress-step.current .progress-circle {
    background: orange;
    transform: scale(1.3);
    animation: pulse 1s infinite;
}

/* LABEL */
.progress-label {
    font-size: 11px;
    margin-top: 5px;
}

/* 🔥 PULSE EFFECT */
@keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(255,165,0,0.6); }
    70% { box-shadow: 0 0 0 10px rgba(255,165,0,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,165,0,0); }
}

    </style>
    <style>
	.timeline-item {
	    padding: 10px;
	    border-left: 3px solid #007bff;
	    margin-left: 10px;
	    margin-bottom: 10px;
	}

	.timeline-time {
	    font-size: 12px;
	    color: gray;
	}

	#timelineModal {
	    display: none;
	    position: fixed;
	    top: 0; left: 0;
	    width: 100%; height: 100%;
	    background: rgba(0,0,0,0.5);
	    justify-content: center;
	    align-items: center;
	}

	/* 🔥 Popup box animation */
	.modal-box {
	    background: white;
	    padding: 20px;
	    border-radius: 10px;
	    width: 400px;

	    transform: translateY(40px);
	    opacity: 0;

	    transition: all 0.4s ease;
	}

	/* 🔥 ACTIVE STATE */
	.modal-box.show {
	    transform: translateY(0);
	    opacity: 1;
}


@media (max-width: 768px) {

    body {
        padding: 10px;
    }

    h1 {
        font-size: 20px;
    }

    /* 🔥 CARDS STACK */
    .cards {
        flex-direction: column;
        gap: 10px;
    }

    .card {
        font-size: 16px;
        padding: 15px;
    }

    /* 🔥 SEARCH + FILTER STACK */
    .filters {
        flex-direction: column;
    }

    /* 🔥 TABLE → CARD VIEW */
    table, thead, tbody, th, td, tr {
        display: block;
        width: 100%;
    }

    thead {
        display: none;
    }

    tr {
        background: white;
        margin-bottom: 10px;
        border-radius: 10px;
        padding: 10px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    td {
        border: none;
        padding: 6px 0;
        font-size: 14px;
    }

    td::before {
        font-weight: bold;
        display: block;
        font-size: 12px;
        color: gray;
    }

    td:nth-child(1)::before { content: "Order ID"; }
    td:nth-child(2)::before { content: "Store"; }
    td:nth-child(3)::before { content: "Items"; }
    td:nth-child(4)::before { content: "Status"; }

    /* 🔥 BUTTONS BIGGER */
    button {
        width: 100%;
        margin-top: 5px;
        padding: 10px;
        font-size: 14px;
    }

    /* 🔥 MODAL FULLSCREEN */
    #timelineModal {
        align-items: flex-end;
    }

    .modal-box {
        width: 100%;
        height: 80%;
        border-radius: 20px 20px 0 0;
        overflow-y: auto;
    }

    /* 🔥 PROGRESS BAR SPACE */

    .progress-label {
	    font-size: 11px;
	    margin-top: 5px;
	    white-space: nowrap;
}
}

tr {
    cursor: pointer;
    transition: transform 0.1s ease;
}

tr:active {
    transform: scale(0.98);
}
</style>
</head>

<body>

<h1>🛒 Kirana Admin Dashboard</h1>
<button onclick="soundEnabled=true">🔊 Enable Sound</button>
<div class="cards">
    <div class="card total">Total: <span id="total">0</span></div>
    <div class="card sent">Sent: <span id="sent">0</span></div>
    <div class="card accepted">Accepted: <span id="accepted">0</span></div>
    <div class="card ready">Ready: <span id="ready">0</span></div>
</div>

<div class="filters" style="margin-bottom: 15px; display: flex; gap: 10px;">

    <input
        id="search"
        placeholder="🔍 Search store or items..."
        style="padding: 8px; flex: 1;"
        oninput="applyFilters()"
    />

    <select id="statusFilter" onchange="applyFilters()" style="padding: 8px;">
        <option value="">All Status</option>
        <option value="CREATED">CREATED</option>
        <option value="SENT">SENT</option>
        <option value="ACCEPTED">ACCEPTED</option>
        <option value="READY">READY</option>
        <option value="COMPLETED">COMPLETED</option>
    </select>

</div>
<table id="orders">
    <thead>
        <tr>
            <th>Order</th>
            <th>Customer</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>

let allOrders = [];
let knownOrderIds = new Set();
let isFirstLoad = true;   // ✅ NEW
let newOrderIds = new Set();
const socket = new WebSocket(`ws://${window.location.host}/ws/admin`);
let soundEnabled = false;

function connectWS() {
    const socket = new WebSocket(`ws://${window.location.host}/ws/admin`);

    socket.onopen = () => {
        console.log("✅ WebSocket connected");
    };

    socket.onmessage = (event) => {
        const data = JSON.parse(event.data);

        console.log("📡 WS EVENT:", data);

        if (data.type === "new_order" || data.type === "status_update") {
            loadOrders();
            loadStats();
        }
    };

    socket.onclose = () => {
        console.log("⚠️ WS disconnected... retrying");
        setTimeout(connectWS, 2000);  // 🔥 auto reconnect
    };

    socket.onerror = (err) => {
        console.log("❌ WS error", err);
    };
}

connectWS();

// Unlock audio on first user interaction
document.addEventListener("click", () => {
    soundEnabled = true;
    console.log("🔓 Sound enabled");
}, { once: true });

socket.onopen = () => {
    console.log("✅ WebSocket connected");

    // 🔥 FORCE LOAD DATA AFTER CONNECT
    loadOrders();
    loadStats();
};

socket.onerror = (err) => {
    console.log("❌ WebSocket error", err);
};

socket.onclose = () => {
    console.log("⚠️ WebSocket closed");
};


async function loadStats() {
    const res = await fetch("/admin/stats");
    const data = await res.json();

    document.getElementById("total").innerText = data.total || 0;
    document.getElementById("sent").innerText = data.sent || 0;
    document.getElementById("accepted").innerText = data.accepted || 0;
    document.getElementById("ready").innerText = data.ready || 0;
}


async function loadOrders() {
    const res = await fetch("/admin/store-orders");
    const data = await res.json();

    // 🔥 Only notify AFTER first load

if (!isFirstLoad) {
    data.forEach(order => {
        if (!knownOrderIds.has(order.id)) {
                       const now = new Date();

					   const created = order.created_at ? new Date(order.created_at) : new Date();

					   if ((now - created) < 10000) {
					       showNotification(order);
					       newOrderIds.add(order.id);
						}


 	      }
    });
}


    // Update known IDs
    knownOrderIds = new Set(data.map(o => o.id));

    // After first load, turn off flag
    isFirstLoad = false;

    allOrders = data;
    applyFilters();
}


async function updateStatus(id, status) {
    await fetch(`/admin/store-orders/${id}`, {
        method: "PATCH",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ status })
    });

    loadOrders();
    loadStats();
}




socket.onmessage = function(event) {
    const data = JSON.parse(event.data);

    console.log("📡 WS EVENT:", data);

    // 🆕 NEW ORDER
    if (data.type === "new_order") {
        console.log("🆕 New order");

        loadOrders();
        loadStats();
        return;
    }

    // 🔄 STATUS UPDATE
    if (data.type === "status_update") {
        console.log("🔄 Status update:", data);

        // 🔥 FIX: reload instead of using old store_order_id
        loadOrders();
        loadStats();

        // OPTIONAL: refresh timeline if open
        if (document.getElementById("timelineModal").style.display === "flex") {
            // reload currently opened timeline safely
            const currentId = window.currentTimelineId;
            if (currentId) {
                openTimeline(currentId);
            }
        }
    }
};

function applyFilters() {
    const search = document.getElementById("search").value.toLowerCase();
    const status = document.getElementById("statusFilter").value;

    const tbody = document.querySelector("#orders tbody");
    tbody.innerHTML = "";

    const filtered = allOrders.filter(order => {
        const matchesSearch =
            order.store.toLowerCase().includes(search) ||
			(order.customer || "").toLowerCase().includes(search);

        const matchesStatus =
            !status || order.status === status;

        return matchesSearch && matchesStatus;
    });

filtered.forEach(order => {
    const row = document.createElement("tr");

    // ✨ highlight if new
    if (newOrderIds.has(order.id)) {
        row.classList.add("new-row");

        // remove highlight after 3 sec
        setTimeout(() => {
            row.classList.remove("new-row");
            newOrderIds.delete(order.id);
        }, 3000);
    }

row.innerHTML = `
    <td>#${order.final_order_id} (${order.store})</td>
    <td>${order.customer}</td>
    <td><span class="badge ${order.status}">${order.status}</span></td>
    <td>
        <button class="btn-accept" onclick="updateStatus(${order.id}, 'ACCEPTED')">Accept</button>
        <button class="btn-ready" onclick="updateStatus(${order.id}, 'READY')">Ready</button>
        <button class="btn-complete" onclick="updateStatus(${order.id}, 'COMPLETED')">Complete</button>
    </td>
`;
	row.style.cursor = "pointer";
	row.onclick = () => openTimeline(order.final_order_id);
    tbody.appendChild(row);
});
console.log("Rendering orders:", filtered);
}

function showNotification(order) {
    const box = document.getElementById("notification");

    box.innerText = `🛒 New Order #${order.final_order_id} (${order.store})`;
    box.style.display = "block";

    // 🔔 Play sound
    playSound();

    setTimeout(() => {
        box.style.display = "none";
    }, 3000);
}

function playSound() {
    if (!soundEnabled) {
        console.log("🔇 Sound blocked (no interaction yet)");
        return;
    }

    const audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

    audio.play().catch(err => {
        console.log("🔇 Sound error:", err);
    });
}

function renderProgressBar(events) {
const steps = [
    "CREATED",
    "PARSED",
    "MATCHED",
    "PRICED",
    "OPTIMIZED",
    "SENT",
    "ACCEPTED",
    "READY",
    "COMPLETED"
	];

    // find current status
    let current = events.length ? events[events.length - 1].status : null;

    let html = '<div class="progress-container">';

    steps.forEach(step => {
        let className = "";

        if (events.some(e => e.status === step)) {
            className = "active";
        }

        if (step === current) {
            className += " current";
        }
	html += `
 	   <div class="progress-step ${className}">
   	     <div class="progress-circle"></div>
   	     <div class="progress-label">${formatLabel(step)}</div>
   	 </div>
	`;

    });

    html += "</div>";

    return html;
}

function formatLabel(step) {
    const map = {
        CREATED: "Created",
        PARSED: "Parsed",
        MATCHED: "Matched",
        PRICED: "Priced",
        OPTIMIZED: "Optimized",
        SENT: "Sent",
        ACCEPTED: "Accepted",
        READY: "Ready",
        COMPLETED: "Done"
    };
    return map[step] || step;
}

async function openTimeline(orderId) {
    window.currentTimelineId = orderId;

    const modal = document.getElementById("timelineModal");
    const box = document.getElementById("timelineContent");
    const modalBox = document.getElementById("modalBox");

    const res = await fetch(`/track/${orderId}/timeline`);

    if (!res.ok) {
        console.error("❌ Timeline API failed");
        return;
    }

    const data = await res.json();

    if (!Array.isArray(data)) {
        console.error("❌ Invalid timeline data", data);
        return;
    }

    // 🔥 SHOW MODAL
    modal.style.display = "flex";

    // RESET animation
    modalBox.classList.remove("show");
    box.style.opacity = 0;

    setTimeout(() => {
        box.innerHTML = "";

        data.forEach(event => {
            const div = document.createElement("div");
            div.className = "timeline-item";

            div.innerHTML = `
                <b>${event.store} → ${event.status}</b><br>
                <span class="timeline-time">${event.time}</span>
            `;

            box.appendChild(div);
        });

        box.style.opacity = 1;

        // 🔥 THIS WAS MISSING
        setTimeout(() => {
            modalBox.classList.add("show");
        }, 50);

    }, 100);
}

function closeModal() {
    const modal = document.getElementById("timelineModal");
    const modalBox = document.getElementById("modalBox");

    modalBox.classList.remove("show");

    setTimeout(() => {
        modal.style.display = "none";
    }, 300);
}


async function init() {
    await loadOrders();   // ensure data loads first
    loadStats();
}

init();

</script>
<div id="notification" style="
    position: fixed;
    top: 20px;
    right: 20px;
    background: #28a745;
    color: white;
    padding: 15px;
    border-radius: 8px;
    display: none;
    font-weight: bold;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
">
    🛒 New Order Received!
</div>


<div id="timelineModal">

    <div id="modalBox" class="modal-box">

        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3>📦 Order Timeline</h3>
            <button onclick="closeModal()">✖</button>
        </div>

        <!-- 🔥 THIS WAS MISSING -->
        <div id="timelineContent"></div>

    </div>
</div>


</div>
</body>
</html>
