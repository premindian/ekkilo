<!DOCTYPE html>
<html>
<head>
    <title>Track Order</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            background: #f6f8fa;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .title {
            font-size: 20px;
            margin-bottom: 10px;
        }

        .items {
            color: gray;
            margin-bottom: 20px;
        }

        .progress {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .step {
            text-align: center;
            flex: 1;
        }

        .circle {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #ddd;
            margin: auto;
            transition: all 0.3s;
        }

        .active .circle {
            background: #28a745;
        }

        .current .circle {
            background: orange;
            transform: scale(1.3);
        }

        .label {
            font-size: 12px;
            margin-top: 5px;
        }
    </style>
</head>

<body>

<div id="orderId"></div>

<div class="card">
    <div class="title">🛒 Order Tracking</div>
    <div id="store"></div>
    <div id="progress"></div>
</div>

<script>
const API_BASE = "https://ekkilo.onrender.com";
const WS_BASE = "wss://ekkilo.onrender.com";

const params = new URLSearchParams(window.location.search);
const orderId = params.get("order_id");

let socket;

document.getElementById("orderId").innerText = "Order #" + orderId;

// 🔥 Try WebSocket first
try {
    socket = new WebSocket(`${WS_BASE}/ws/${orderId}`);

    socket.onmessage = function () {
        loadOrder();
    };

    socket.onerror = () => {
        console.log("⚠️ WebSocket failed, fallback to polling");
        startPolling();
    };

} catch (e) {
    startPolling();
}

// 🔁 Fallback polling
function startPolling() {
    setInterval(loadOrder, 3000);
}

// 📦 Load order from backend
async function loadOrder() {
    if (!orderId) {
        alert("Invalid order ID");
        return;
    }

    try {
        const res = await fetch(`${API_BASE}/track/${orderId}`);
        const data = await res.json();

        if (!data.stores || data.stores.length === 0) {
            document.getElementById("store").innerHTML = "No stores found";
            return;
        }

        // 🏪 Store display
        const storeDiv = document.getElementById("store");
        storeDiv.innerHTML = "<b>🏪 Stores:</b><br>";

        data.stores.forEach(s => {
            storeDiv.innerHTML += `• ${s.store} → <b>${s.status}</b><br>`;
        });

        // 📊 Progress
        const overall = getOverallStatus(data.stores);
        renderProgress(overall);

    } catch (err) {
        console.error("Error loading order:", err);
    }
}

// 📊 Compute overall status
function getOverallStatus(stores) {
    const statuses = stores.map(s => s.status);

    if (statuses.every(s => s === "READY")) return "READY";
    if (statuses.some(s => s === "READY")) return "PARTIAL_READY";
    if (statuses.every(s => s === "ACCEPTED")) return "ACCEPTED";
    return "PROCESSING";
}

// 🎯 Render progress UI
function renderProgress(status) {
    const steps = ["PROCESSING", "ACCEPTED", "PARTIAL_READY", "READY"];

    let html = '<div class="progress">';

    steps.forEach(step => {
        let cls = "";

        if (steps.indexOf(step) <= steps.indexOf(status)) {
            cls = "active";
        }

        if (step === status) {
            cls += " current";
        }

        html += `
            <div class="step ${cls}">
                <div class="circle"></div>
                <div class="label">${formatLabel(step)}</div>
            </div>
        `;
    });

    html += "</div>";

    document.getElementById("progress").innerHTML = html;
}

// 🏷️ Label formatter
function formatLabel(step) {
    const map = {
        PROCESSING: "⏳ Processing",
        ACCEPTED: "✅ Accepted",
        PARTIAL_READY: "🟡 Partial Ready",
        READY: "📦 Ready"
    };
    return map[step] || step;
}

// 🚀 Initial load
loadOrder();
</script>

</body>
</html>
